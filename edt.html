<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grille emploi du temps</title>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f2ec; --surface: #ffffff; --border: #e2ddd5;
    --text: #1a1714; --muted: #8c8278; --accent: #2d6a4f;
    --accent-light: #e8f4ee; --shadow: 0 1px 3px rgba(0,0,0,0.06);
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 24px; }
  header { margin-bottom: 24px; }
  header h1 { font-family: 'DM Serif Display', serif; font-size: 26px; font-weight: 400; }

  .filtres {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 20px; margin-bottom: 24px; display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px;
  }
  .filtre-group label { display: block; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .filtre-group select, .filtre-group input {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 7px;
    font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text);
    background: var(--bg); outline: none; cursor: pointer;
  }
  .filtre-group select:focus, .filtre-group input:focus { border-color: var(--accent); }

  .btn-afficher {
    background: var(--accent); color: white; border: none; border-radius: 7px;
    padding: 9px 20px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
    cursor: pointer; align-self: end;
  }
  .btn-afficher:hover { background: #235c42; }

  .grid-wrapper { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 600px; }
  th {
    background: var(--accent); color: white; padding: 10px 14px;
    font-size: 13px; font-weight: 600; text-align: center; white-space: nowrap;
  }
  th.creneau-col { background: #1a4a35; text-align: left; min-width: 110px; }
  td { border: 1px solid var(--border); vertical-align: top; padding: 0; min-width: 140px; }
  td.creneau-label {
    padding: 10px 12px; font-size: 12px; color: var(--muted); font-weight: 500;
    background: #faf8f4; white-space: nowrap;
  }
  td.cell-dispo { padding: 6px 8px; }
  td.cell-vide { background: #f0ece6; }

  .cours-item {
    background: var(--accent-light); border: 1px solid #b8dcc8; border-radius: 6px;
    padding: 6px 8px; margin-bottom: 4px; font-size: 12px;
  }
  .cours-item .enseignant { font-weight: 600; color: var(--accent); }
  .cours-item .cours-nom { color: var(--text); margin-top: 2px; font-size: 11px; line-height: 1.3; }

  .cours-item.grised { background: #e8e4de; border-color: #d0cbc4; opacity: 0.5; }
  .cours-item.placed { background: #c8e8d8; border-color: var(--accent); }

  .empty-state { text-align: center; padding: 48px 24px; color: var(--muted); font-size: 14px; }
  .loader { text-align: center; padding: 48px; color: var(--muted); font-size: 14px; }
  .error-box { background: #fdf0ef; border: 1px solid #f0c0bc; border-radius: 8px; padding: 14px 18px; color: #c0392b; font-size: 13px; margin-bottom: 16px; }
</style>
</head>
<body>

<header>
  <h1>Grille emploi du temps</h1>
</header>

<div id="error-box" class="error-box" style="display:none"></div>

<div class="filtres">
  <div class="filtre-group">
    <label>Campus</label>
    <select id="f-campus" onchange="updateFiltres()"><option value="">--</option></select>
  </div>
  <div class="filtre-group">
    <label>Cycle</label>
    <select id="f-cycle" onchange="updateFiltres()"><option value="">--</option></select>
  </div>
  <div class="filtre-group">
    <label>Année</label>
    <select id="f-annee" onchange="updateFiltres()"><option value="">--</option></select>
  </div>
  <div class="filtre-group">
    <label>Semestre</label>
    <select id="f-semestre" onchange="updateFiltres()"><option value="">--</option></select>
  </div>
  <div class="filtre-group">
    <label>Option</label>
    <select id="f-option" onchange="updateFiltres()"><option value="">--</option></select>
  </div>
  <div class="filtre-group">
    <button class="btn-afficher" onclick="renderGrille()">Afficher</button>
  </div>
</div>

<div id="content"><div class="empty-state">Sélectionnez une formation puis cliquez sur "Afficher".</div></div>

<script>
  const JOURS = ['Lundi', 'Mardi', 'Mercredi', 'Jeudi', 'Vendredi'];
  const CRENEAUX = {
    'Lundi':    ['8h30-10h', '10h15-11h45', '12h-13h30', '13h-14h30', '14h45-16h15', '16h30-18h', '18h15-19h45'],
    'Mardi':    ['8h30-10h', '10h15-11h45', '12h-13h30', '13h-14h30', '14h45-16h15', '16h30-18h', '18h15-19h45'],
    'Mercredi': ['8h30-10h', '10h15-11h45', '12h-13h30', '13h-14h30', '14h45-16h15', '16h30-18h', '18h15-19h45'],
    'Jeudi':    ['8h30-10h', '10h15-11h45'],
    'Vendredi': ['8h30-10h', '10h15-11h45', '12h-13h30', '13h-14h30', '14h45-16h15', '16h30-18h', '18h15-19h45']
  };
  const ALL_CRENEAUX = ['8h30-10h', '10h15-11h45', '12h-13h30', '13h-14h30', '14h45-16h15', '16h30-18h', '18h15-19h45'];

  let coursData = [];
  let enseignantsData = null;
  let dispoData = [];

  grist.ready({ requiredAccess: 'full' });
  grist.onOptions(function() { initialLoad(); });
  grist.on('message', async function(e) { if (e.tableId) await initialLoad(); });

  async function initialLoad() {
    try {
      enseignantsData = await grist.docApi.fetchTable('Enseignants');
      const cours = await grist.docApi.fetchTable('Cours');
      coursData = cours.id.map(function(id, i) {
        return {
          rowId: id,
          label: (cours.Cours_label || [])[i] || '',
          campus: (cours.Campus || [])[i] || '',
          cycle: (cours.Cycle || [])[i] || '',
          annee: (cours.Annee || [])[i] || '',
          semestre: (cours.Semestre || [])[i] || '',
          option: (cours.Option || [])[i] || '',
          affecte: (cours.Enseignant_affecte || [])[i] || null
        };
      });
      const dispo = await grist.docApi.fetchTable('Disponibilites');
      dispoData = dispo.id.map(function(id, i) {
        return {
          enseignant: (dispo.Nom || [])[i],
          jour: (dispo.Jour || [])[i] || '',
          creneau: (dispo.Creneau || [])[i] || ''
        };
      });
      peuplerFiltres();
    } catch(err) { showError('Erreur : ' + err.message); }
  }

  function valuesUniques(arr) {
    return [...new Set(arr.filter(Boolean))].sort(function(a,b) { return String(a).localeCompare(String(b), 'fr'); });
  }

  function peuplerFiltres() {
    peuplerSelect('f-campus', valuesUniques(coursData.map(function(c){return c.campus;})));
    peuplerSelect('f-cycle', valuesUniques(coursData.map(function(c){return c.cycle;})));
    peuplerSelect('f-annee', valuesUniques(coursData.map(function(c){return c.annee;})));
    peuplerSelect('f-semestre', valuesUniques(coursData.map(function(c){return c.semestre;})));
    peuplerSelect('f-option', valuesUniques(coursData.map(function(c){return c.option;})));
  }

  function peuplerSelect(id, values) {
    var sel = document.getElementById(id);
    var current = sel.value;
    sel.innerHTML = '<option value="">--</option>';
    values.forEach(function(v) {
      var opt = document.createElement('option');
      opt.value = v;
      opt.textContent = v;
      if (String(v) === current) opt.selected = true;
      sel.appendChild(opt);
    });
  }

  function updateFiltres() {
    var campus = document.getElementById('f-campus').value;
    var cycle = document.getElementById('f-cycle').value;
    var annee = document.getElementById('f-annee').value;
    var semestre = document.getElementById('f-semestre').value;
    var option = document.getElementById('f-option').value;

    var filtered = coursData.filter(function(c) {
      return (!campus || c.campus === campus) &&
             (!cycle || c.cycle === cycle) &&
             (!annee || String(c.annee) === String(annee)) &&
             (!semestre || String(c.semestre) === String(semestre)) &&
             (!option || c.option === option);
    });

    if (campus) peuplerSelect('f-cycle', valuesUniques(filtered.map(function(c){return c.cycle;})));
    if (cycle) peuplerSelect('f-annee', valuesUniques(filtered.map(function(c){return c.annee;})));
    if (annee) peuplerSelect('f-semestre', valuesUniques(filtered.map(function(c){return c.semestre;})));
    if (semestre) peuplerSelect('f-option', valuesUniques(filtered.map(function(c){return c.option;})));
  }

  function getFiltre() {
    return {
      campus: document.getElementById('f-campus').value,
      cycle: document.getElementById('f-cycle').value,
      annee: document.getElementById('f-annee').value,
      semestre: document.getElementById('f-semestre').value,
      option: document.getElementById('f-option').value
    };
  }

  function nomEnseignant(rowId) {
    if (!rowId) return null;
    var idx = enseignantsData.id.indexOf(rowId);
    if (idx === -1) return null;
    var nom = (enseignantsData.Nom || [])[idx] || '';
    var prenom = (enseignantsData.Prenom || [])[idx] || '';
    return nom + (prenom ? ' ' + prenom : '');
  }

  let placed = {}; // "coursLabel|ensRowId" → "jour|creneau"

  function renderGrille() {
    var f = getFiltre();
    if (!f.campus || !f.cycle || !f.annee || !f.semestre) {
      document.getElementById('content').innerHTML = '<div class="empty-state">Veuillez sélectionner Campus, Cycle, Année et Semestre.</div>';
      return;
    }

    // Cours de la formation sélectionnée avec un enseignant affecté
    var coursFormation = coursData.filter(function(c) {
      return c.campus === f.campus && c.cycle === f.cycle &&
             String(c.annee) === String(f.annee) && String(c.semestre) === String(f.semestre) &&
             (!f.option || c.option === f.option) && c.affecte;
    });

    // Index : enseignantRowId → [{rowId, label}]
    var enseignantCours = {};
    coursFormation.forEach(function(c) {
      if (!enseignantCours[c.affecte]) enseignantCours[c.affecte] = [];
      enseignantCours[c.affecte].push({ rowId: c.rowId, label: c.label });
    });

    // Index disponibilités : "ensRowId|jour|creneau" → true
    var dispoIndex = new Set();
    dispoData.forEach(function(d) {
      dispoIndex.add(d.enseignant + '|' + d.jour + '|' + d.creneau);
    });

    var html = '<div class="grid-wrapper"><table><thead><tr><th class="creneau-col">Créneau</th>';
    JOURS.forEach(function(j) { html += '<th>' + j + '</th>'; });
    html += '</tr></thead><tbody>';

    ALL_CRENEAUX.forEach(function(creneau) {
      html += '<tr><td class="creneau-label">' + creneau + '</td>';
      JOURS.forEach(function(jour) {
        if (!CRENEAUX[jour].includes(creneau)) {
          html += '<td class="cell-vide"></td>';
        } else {
          // Enseignants affectés à un cours de cette formation ET disponibles sur ce créneau
          var items = [];
          Object.keys(enseignantCours).forEach(function(ensId) {
            ensId = parseInt(ensId);
            if (dispoIndex.has(ensId + '|' + jour + '|' + creneau)) {
              var nom = nomEnseignant(ensId);
              var cours = enseignantCours[ensId];
              if (nom) {
                cours.forEach(function(c) {
                  items.push({ nom: nom, label: c.label, coursRowId: c.rowId, ensId: ensId });
                });
              }
            }
          });

          if (items.length === 0) {
            html += '<td class="cell-dispo cell-vide"></td>';
          } else {
            html += '<td class="cell-dispo">' +
              items.map(function(item) {
                var key = item.coursRowId + "||" + item.ensId;
                var placedSlot = placed[key];
                var isPlaced = placedSlot === (jour + "|" + creneau);
                var ensPlacedOnSlot = Object.keys(placed).some(function(k) {
                  var parts = k.split("||");
                  var kEnsId = parseInt(parts[1]);
                  return kEnsId === item.ensId && placed[k] === (jour + "|" + creneau) && k !== key;
                });
                var isGrised = (placedSlot && !isPlaced) || ensPlacedOnSlot;
                return '<div class="cours-item' + (isGrised ? ' grised' : '') + (isPlaced ? ' placed' : '') + '">' +
                  '<label style="display:flex;align-items:flex-start;gap:6px;cursor:' + (isGrised ? 'default' : 'pointer') + '">' +
                  '<input type="checkbox" ' + (isPlaced ? 'checked ' : '') + (isGrised ? 'disabled ' : '') +
                  ' onchange="togglePlace(' + item.coursRowId + ',"' + item.ensId + ',"' + jour + '","' + creneau + '",this)" style="margin-top:2px;accent-color:var(--accent)">' +
                  '<div><div class="enseignant">' + esc(item.nom) + '</div>' +
                  '<div class="cours-nom">' + esc(item.label) + '</div></div>' +
                  '</label></div>';
              }).join('') +
            '</td>';
          }
        }
      });
      html += '</tr>';
    });

    html += '</tbody></table></div>';
    document.getElementById('content').innerHTML = html;
  }

  function togglePlace(coursRowId, ensId, jour, creneau, checkbox) {
    var key = coursRowId + '||' + ensId;
    if (checkbox.checked) {
      placed[key] = jour + '|' + creneau;
    } else {
      delete placed[key];
    }
    renderGrille();
  }

  function escAttr(str) {
    return String(str || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
  }

  function esc(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function showError(msg) {
    document.getElementById('error-box').textContent = msg;
    document.getElementById('error-box').style.display = 'block';
  }

  initialLoad();
</script>
</body>
</html>
