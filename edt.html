<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grille emploi du temps</title>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f2ec; --surface: #ffffff; --border: #e2ddd5;
    --text: #1a1714; --muted: #8c8278; --accent: #2d6a4f;
    --accent-light: #e8f4ee; --shadow: 0 1px 3px rgba(0,0,0,0.06);
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 24px; }
  header { margin-bottom: 20px; }
  header h1 { font-family: 'DM Serif Display', serif; font-size: 26px; font-weight: 400; }

  .filtres { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
  .filtre-group label { display: block; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .filtre-group select { width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: 7px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text); background: var(--bg); outline: none; cursor: pointer; }
  .filtre-group select:focus { border-color: var(--accent); }
  .btn-afficher { background: var(--accent); color: white; border: none; border-radius: 7px; padding: 8px 16px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; width: 100%; }
  .btn-afficher:hover { background: #235c42; }
  .btn-reset { background: var(--bg); color: var(--muted); border: 1px solid var(--border); border-radius: 7px; padding: 8px 16px; font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; width: 100%; margin-top: 4px; }

  .grid-wrapper { overflow-x: auto; margin-bottom: 24px; }
  table { width: 100%; border-collapse: collapse; min-width: 600px; }
  th { background: var(--accent); color: white; padding: 10px 14px; font-size: 13px; font-weight: 600; text-align: center; white-space: nowrap; }
  th.creneau-col { background: #1a4a35; text-align: left; min-width: 110px; }
  td { border: 1px solid var(--border); vertical-align: top; padding: 0; min-width: 140px; }
  td.creneau-label { padding: 10px 12px; font-size: 12px; color: var(--muted); font-weight: 500; background: #faf8f4; white-space: nowrap; }
  td.cell-dispo { padding: 6px 8px; }
  td.cell-vide { background: #f0ece6; }

  .cours-item { border: 1px solid var(--border); border-radius: 6px; padding: 6px 8px; margin-bottom: 4px; font-size: 12px; }
  .cours-item .enseignant { font-weight: 600; }
  .cours-item .cours-nom { margin-top: 2px; font-size: 11px; line-height: 1.3; }
  .cours-item.cm { background: #fde8e8; border-color: #f0b8b8; }
  .cours-item.cm .enseignant { color: #c0392b; }
  .cours-item.td { background: #e8f0fd; border-color: #b8c8f0; }
  .cours-item.td .enseignant { color: #2d4a8a; }
  .cours-item.tp { background: #fdf5e8; border-color: #f0dbb8; }
  .cours-item.tp .enseignant { color: #8a5a2d; }
  .cours-item.grised { background: #e8e4de !important; border-color: #d0cbc4 !important; opacity: 0.5; }
  .cours-item.placed-cm { background: #e74c3c !important; border-color: #c0392b !important; }
  .cours-item.placed-cm .enseignant, .cours-item.placed-cm .cours-nom { color: white !important; }
  .cours-item.placed-td { background: #2d4a8a !important; border-color: #1a2f5a !important; }
  .cours-item.placed-td .enseignant, .cours-item.placed-td .cours-nom { color: white !important; }
  .cours-item.placed-tp { background: #8a5a2d !important; border-color: #5a3a1a !important; }
  .cours-item.placed-tp .enseignant, .cours-item.placed-tp .cours-nom { color: white !important; }
  .cours-item.placed-default { background: #c8e8d8 !important; border-color: var(--accent) !important; }
  .cours-item.exclu { background: #f0ece6 !important; border-color: #d0cbc4 !important; opacity: 0.4; pointer-events: none; }
  .cours-item.exclu .corbeille { pointer-events: all; opacity: 1; }

  .cours-item-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 4px; }
  .corbeille { background: none; border: none; cursor: pointer; font-size: 13px; padding: 0 2px; opacity: 0.7; transition: opacity 0.15s; flex-shrink: 0; line-height: 1; }
  .corbeille:hover { opacity: 1; }
  .corbeille.active { opacity: 1; color: #c0392b; }

  .non-couverts { margin-top: 24px; }
  .non-couverts h2 { font-family: 'DM Serif Display', serif; font-size: 18px; font-weight: 400; color: #c0392b; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid #f0b8b8; }
  .nc-list { display: flex; flex-direction: column; gap: 8px; }
  .nc-item { border-radius: 8px; padding: 10px 14px; font-size: 13px; }
  .nc-item .nc-label { font-weight: 500; }
  .nc-item .nc-raison { font-size: 11px; color: #c0392b; margin-top: 3px; }

  .empty-state { text-align: center; padding: 48px 24px; color: var(--muted); font-size: 14px; }
  .loader { text-align: center; padding: 48px; color: var(--muted); font-size: 14px; }
  .error-box { background: #fdf0ef; border: 1px solid #f0c0bc; border-radius: 8px; padding: 14px 18px; color: #c0392b; font-size: 13px; margin-bottom: 16px; }
</style>
</head>
<body>

<header>
  <h1>Grille emploi du temps</h1>
</header>

<div id="error-box" class="error-box" style="display:none"></div>

<div class="filtres">
  <div class="filtre-group"><label>Campus</label><select id="f-campus" onchange="updateFiltres('campus')"><option value="">--</option></select></div>
  <div class="filtre-group"><label>Cycle</label><select id="f-cycle" onchange="updateFiltres('cycle')"><option value="">--</option></select></div>
  <div class="filtre-group"><label>Spécialité</label><select id="f-specialite" onchange="updateFiltres('specialite')"><option value="">--</option></select></div>
  <div class="filtre-group"><label>Année</label><select id="f-annee" onchange="updateFiltres('annee')"><option value="">--</option></select></div>
  <div class="filtre-group"><label>Semestre</label><select id="f-semestre" onchange="updateFiltres('semestre')"><option value="">--</option></select></div>
  <div class="filtre-group"><label>Option</label><select id="f-option" onchange="updateFiltres('option')"><option value="">--</option></select></div>
  <div class="filtre-group" style="display:flex;flex-direction:column;justify-content:flex-end">
    <button class="btn-afficher" onclick="renderGrille()">Afficher</button>
    <button class="btn-reset" onclick="resetFiltres()">↺ Réinitialiser</button>
  </div>
</div>

<div id="content"><div class="empty-state">Sélectionnez une formation puis cliquez sur "Afficher".</div></div>

<script>
  const JOURS = ['Lundi', 'Mardi', 'Mercredi', 'Jeudi', 'Vendredi'];
  const CRENEAUX_CERGY = {
    'Lundi':    ['8h30-10h', '10h15-11h45', '12h-13h30', '13h-14h30', '14h45-16h15', '16h30-18h', '18h15-19h45'],
    'Mardi':    ['8h30-10h', '10h15-11h45', '12h-13h30', '13h-14h30', '14h45-16h15', '16h30-18h', '18h15-19h45'],
    'Mercredi': ['8h30-10h', '10h15-11h45', '12h-13h30', '13h-14h30', '14h45-16h15', '16h30-18h', '18h15-19h45'],
    'Jeudi':    ['8h30-10h', '10h15-11h45'],
    'Vendredi': ['8h30-10h', '10h15-11h45', '12h-13h30', '13h-14h30', '14h45-16h15', '16h30-18h', '18h15-19h45']
  };
  const ALL_CRENEAUX_CERGY = ['8h30-10h', '10h15-11h45', '12h-13h30', '13h-14h30', '14h45-16h15', '16h30-18h', '18h15-19h45'];

  const CRENEAUX_PAU = {
    'Lundi':    ['8h-9h30', '9h45-11h15', '11h30-13h', '14h15-15h45', '16h00-17h30', '17h45-19h15'],
    'Mardi':    ['8h-9h30', '9h45-11h15', '11h30-13h', '14h15-15h45', '16h00-17h30', '17h45-19h15'],
    'Mercredi': ['8h-9h30', '9h45-11h15', '11h30-13h', '14h15-15h45', '16h00-17h30', '17h45-19h15'],
    'Jeudi':    ['8h-9h30', '9h45-11h15', '11h30-13h', '14h15-15h45', '16h00-17h30', '17h45-19h15'],
    'Vendredi': ['8h-9h30', '9h45-11h15', '11h30-13h', '14h15-15h45', '16h00-17h30', '17h45-19h15']
  };
  const ALL_CRENEAUX_PAU = ['8h-9h30', '9h45-11h15', '11h30-13h', '14h15-15h45', '16h00-17h30', '17h45-19h15'];

  function getCRENEAUX(campus) { return campus === 'Pau' ? CRENEAUX_PAU : CRENEAUX_CERGY; }
  function getAllCRENEAUX(campus) { return campus === 'Pau' ? ALL_CRENEAUX_PAU : ALL_CRENEAUX_CERGY; }

  let coursData = [];
  let enseignantsData = null;
  let dispoData = [];
  let placed = {};
  let excluded = new Set();
  let loaded = false;

  grist.ready({ requiredAccess: 'full' });
  grist.onOptions(function() { if (!loaded) initialLoad(); });
  grist.on('message', async function(e) { if (e.tableId && !loaded) await initialLoad(); });

  async function initialLoad() {
    loaded = true;
    try {
      enseignantsData = await grist.docApi.fetchTable('Enseignants');
      const cours = await grist.docApi.fetchTable('Cours');
      coursData = cours.id.map(function(id, i) {
        return {
          rowId: id,
          label: (cours.Cours_label || [])[i] || '',
          campus: (cours.Campus || [])[i] || '',
          cycle: (cours.Cycle || [])[i] || '',
          specialite: (cours.Specialite || [])[i] || '',
          annee: (cours.Annee || [])[i] || '',
          semestre: (cours.Semestre || [])[i] || '',
          option: (cours.Option || [])[i] || '',
          affecte: (cours.Enseignant_affecte || [])[i] || null
        };
      }).filter(function(r) { return r.label.length > 3; });

      const dispo = await grist.docApi.fetchTable('Disponibilites');
      dispoData = dispo.id.map(function(id, i) {
        return {
          enseignant: (dispo.Nom || [])[i],
          jour: (dispo.Jour || [])[i] || '',
          creneau: (dispo.Creneau || [])[i] || ''
        };
      });

      peuplerFiltresInitial();
    } catch(err) { showError('Erreur : ' + err.message); }
  }

  function uniques(arr) {
    return [...new Set(arr.filter(function(v){ return v !== null && v !== undefined && String(v).trim() !== ''; }))].sort(function(a,b){ return String(a).localeCompare(String(b),'fr'); });
  }

  function peuplerSelect(id, vals, label) {
    var sel = document.getElementById(id);
    var current = sel.value;
    sel.innerHTML = '<option value="">' + (label || '--') + '</option>';
    vals.forEach(function(v) {
      var opt = document.createElement('option');
      opt.value = String(v); opt.textContent = String(v);
      if (String(v) === current) opt.selected = true;
      sel.appendChild(opt);
    });
  }

  function peuplerFiltresInitial() {
    peuplerSelect('f-campus', uniques(coursData.map(function(c){return c.campus;})));
    peuplerSelect('f-cycle', uniques(coursData.map(function(c){return c.cycle;})));
    peuplerSelect('f-specialite', uniques(coursData.map(function(c){return c.specialite;})));
    peuplerSelect('f-annee', uniques(coursData.map(function(c){return c.annee;})));
    peuplerSelect('f-semestre', uniques(coursData.map(function(c){return c.semestre;})));
    peuplerSelect('f-option', uniques(coursData.map(function(c){return c.option;})));
  }

  function updateFiltres(changed) {
    var fCampus = document.getElementById('f-campus').value;
    var fCycle = document.getElementById('f-cycle').value;
    var fSpec = document.getElementById('f-specialite').value;
    var fAnnee = document.getElementById('f-annee').value;
    var fSemestre = document.getElementById('f-semestre').value;

    var r0 = coursData;
    var r1 = fCampus ? r0.filter(function(c){return c.campus===fCampus;}) : r0;
    var r2 = fCycle ? r1.filter(function(c){return c.cycle===fCycle;}) : r1;
    var r3 = fSpec ? r2.filter(function(c){return c.specialite===fSpec;}) : r2;
    var r4 = fAnnee ? r3.filter(function(c){return String(c.annee)===fAnnee;}) : r3;
    var r5 = fSemestre ? r4.filter(function(c){return String(c.semestre)===fSemestre;}) : r4;

    if (changed !== 'campus') {} else peuplerSelect('f-cycle', uniques(r1.map(function(c){return c.cycle;})));
    if (changed === 'campus' || changed === 'cycle') peuplerSelect('f-specialite', uniques(r2.map(function(c){return c.specialite;})));
    if (changed === 'campus' || changed === 'cycle' || changed === 'specialite') peuplerSelect('f-annee', uniques(r3.map(function(c){return c.annee;})));
    if (changed !== 'semestre' && changed !== 'option') peuplerSelect('f-semestre', uniques(r4.map(function(c){return c.semestre;})));
    peuplerSelect('f-option', uniques(r5.map(function(c){return c.option;})));
  }

  function resetFiltres() {
    ['f-campus','f-cycle','f-specialite','f-annee','f-semestre','f-option'].forEach(function(id){
      document.getElementById(id).value = '';
    });
    peuplerFiltresInitial();
    document.getElementById('content').innerHTML = '<div class="empty-state">Sélectionnez une formation puis cliquez sur "Afficher".</div>';
    placed = {};
    excluded = new Set();
  }

  function getFiltre() {
    return {
      campus: document.getElementById('f-campus').value,
      cycle: document.getElementById('f-cycle').value,
      specialite: document.getElementById('f-specialite').value,
      annee: document.getElementById('f-annee').value,
      semestre: document.getElementById('f-semestre').value,
      option: document.getElementById('f-option').value
    };
  }

  function nomEnseignant(rowId) {
    if (!rowId) return null;
    var idx = enseignantsData.id.indexOf(rowId);
    if (idx === -1) return null;
    return ((enseignantsData.Nom||[])[idx]||'') + ((enseignantsData.Prenom||[])[idx] ? ' '+(enseignantsData.Prenom||[])[idx] : '');
  }

  function typeClass(label) {
    var u = (label||'').toUpperCase();
    if (u.indexOf(' CM') !== -1) return 'cm';
    if (u.indexOf(' TD') !== -1) return 'td';
    if (u.indexOf(' TP') !== -1) return 'tp';
    return '';
  }

  function renderGrille() {
    var f = getFiltre();
    if (!f.campus || !f.cycle || !f.annee || !f.semestre) {
      document.getElementById('content').innerHTML = '<div class="empty-state">Veuillez sélectionner au minimum Campus, Cycle, Année et Semestre.</div>';
      return;
    }

    var coursFormation = coursData.filter(function(c) {
      return c.campus === f.campus && c.cycle === f.cycle &&
             (!f.specialite || c.specialite === f.specialite) &&
             String(c.annee) === String(f.annee) && String(c.semestre) === String(f.semestre) &&
             (!f.option || c.option === f.option) && c.affecte;
    });

    var enseignantCours = {};
    coursFormation.forEach(function(c) {
      if (!enseignantCours[c.affecte]) enseignantCours[c.affecte] = [];
      enseignantCours[c.affecte].push({ rowId: c.rowId, label: c.label });
    });

    var dispoIndex = new Set();
    dispoData.forEach(function(d) {
      dispoIndex.add(d.enseignant + '|' + d.jour + '|' + d.creneau);
    });

    var CRENEAUX = getCRENEAUX(f.campus);
    var ALL_CRENEAUX = getAllCRENEAUX(f.campus);

    var html = '<div class="grid-wrapper"><table><thead><tr><th class="creneau-col">Créneau</th>';
    JOURS.forEach(function(j) { html += '<th>' + j + '</th>'; });
    html += '</tr></thead><tbody>';

    ALL_CRENEAUX.forEach(function(creneau) {
      html += '<tr><td class="creneau-label">' + creneau + '</td>';
      JOURS.forEach(function(jour) {
        if (!CRENEAUX[jour].includes(creneau)) {
          html += '<td class="cell-vide"></td>';
        } else {
          var items = [];
          Object.keys(enseignantCours).forEach(function(ensId) {
            ensId = parseInt(ensId);
            if (dispoIndex.has(ensId + '|' + jour + '|' + creneau)) {
              var nom = nomEnseignant(ensId);
              if (nom) {
                enseignantCours[ensId].forEach(function(c) {
                  items.push({ nom: nom, label: c.label, coursRowId: c.rowId, ensId: ensId });
                });
              }
            }
          });

          if (items.length === 0) {
            html += '<td class="cell-dispo cell-vide"></td>';
          } else {
            html += '<td class="cell-dispo">' +
              items.map(function(item) {
                var key = item.coursRowId + '||' + item.ensId;
                var exclKey = item.coursRowId + '||' + item.ensId + '||' + jour + '||' + creneau;
                var placedSlot = placed[key];
                var isPlaced = placedSlot === (jour + '|' + creneau);
                var isExclu = excluded.has(exclKey);
                var ensPlacedOnSlot = Object.keys(placed).some(function(k) {
                  var parts = k.split('||');
                  return parseInt(parts[1]) === item.ensId && placed[k] === (jour + '|' + creneau) && k !== key;
                });
                var isGrised = (placedSlot && !isPlaced) || ensPlacedOnSlot;
                var tc = typeClass(item.label);
                var classes = 'cours-item ' + tc + (isGrised ? ' grised' : '') + (isPlaced ? ' placed-' + (tc||'default') : '') + (isExclu ? ' exclu' : '');

                return '<div class="' + classes + '">' +
                  '<div class="cours-item-header">' +
                  '<label style="display:flex;align-items:flex-start;gap:5px;cursor:' + (isGrised||isExclu ? 'default' : 'pointer') + ';flex:1">' +
                  '<input type="checkbox" ' + (isPlaced ? 'checked ' : '') + (isGrised||isExclu ? 'disabled ' : '') +
                  ' onchange="togglePlace(' + item.coursRowId + ',' + item.ensId + ',\'' + jour + '\',\'' + creneau + '\',this)" style="margin-top:2px;accent-color:var(--accent);flex-shrink:0">' +
                  '<div><div class="enseignant">' + esc(item.nom) + '</div>' +
                  '<div class="cours-nom">' + esc(item.label) + '</div></div>' +
                  '</label>' +
                  '<button class="corbeille' + (isExclu ? ' active' : '') + '" onclick="toggleExclu(\'' + exclKey + '\')" title="' + (isExclu ? 'Réactiver' : 'Exclure') + '">🗑</button>' +
                  '</div></div>';
              }).join('') + '</td>';
          }
        }
      });
      html += '</tr>';
    });

    html += '</tbody></table></div>';

    // Cours non couverts
    var tousNonCouverts = coursData.filter(function(c) {
      return c.campus === f.campus && c.cycle === f.cycle &&
             (!f.specialite || c.specialite === f.specialite) &&
             String(c.annee) === String(f.annee) && String(c.semestre) === String(f.semestre) &&
             (!f.option || c.option === f.option);
    }).filter(function(c) {
      if (!c.affecte) return true;
      return !dispoData.some(function(d) { return d.enseignant === c.affecte; });
    });

    if (tousNonCouverts.length > 0) {
      html += '<div class="non-couverts"><h2>⚠ Cours non couverts (' + tousNonCouverts.length + ')</h2><div class="nc-list">';
      tousNonCouverts.forEach(function(c) {
        var tc = typeClass(c.label);
        var raison = !c.affecte ? 'Aucun enseignant affecté' : 'Enseignant affecté sans disponibilités (' + (nomEnseignant(c.affecte)||'?') + ')';
        html += '<div class="nc-item cours-item ' + tc + '"><div class="nc-label">' + esc(c.label) + '</div><div class="nc-raison">' + esc(raison) + '</div></div>';
      });
      html += '</div></div>';
    }

    document.getElementById('content').innerHTML = html;
  }

  function togglePlace(coursRowId, ensId, jour, creneau, checkbox) {
    var key = coursRowId + '||' + ensId;
    if (checkbox.checked) placed[key] = jour + '|' + creneau;
    else delete placed[key];
    renderGrille();
  }

  function toggleExclu(exclKey) {
    if (excluded.has(exclKey)) {
      excluded.delete(exclKey);
    } else {
      excluded.add(exclKey);
      var parts = exclKey.split('||');
      var key = parts[0] + '||' + parts[1];
      if (placed[key] === parts[2] + '|' + parts[3]) delete placed[key];
    }
    renderGrille();
  }

  function resetFiltresEtGrille() {
    resetFiltres();
  }

  function esc(str) { return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function showError(msg) { document.getElementById('error-box').textContent = msg; document.getElementById('error-box').style.display = 'block'; }

  initialLoad();
</script>
</body>
</html>
