<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candidatures aux cours</title>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f2ec; --surface: #ffffff; --border: #e2ddd5;
    --text: #1a1714; --muted: #8c8278; --accent: #2d6a4f;
    --accent-light: #e8f4ee; --danger: #c0392b; --danger-light: #fdf0ef;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 24px; }
  header { margin-bottom: 28px; }
  header h1 { font-family: 'DM Serif Display', serif; font-size: 26px; font-weight: 400; }
  #user-info { margin-top: 6px; font-size: 13px; color: var(--muted); }
  #user-info span { font-weight: 500; color: var(--accent); }
  .selector-box { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 20px; }
  .selector-box label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 8px; }
  .selector-box select { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: 7px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); background: var(--bg); outline: none; cursor: pointer; }
  .selector-box select:focus { border-color: var(--accent); }
  .tabs { display: flex; gap: 4px; margin-bottom: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 4px; }
  .tab { flex: 1; padding: 8px; border: none; border-radius: 6px; background: transparent; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; color: var(--muted); cursor: pointer; transition: all 0.18s; }
  .tab.active { background: var(--accent); color: #fff; }
  .cours-list { display: flex; flex-direction: column; gap: 10px; }
  .cours-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; display: flex; align-items: center; justify-content: space-between; gap: 12px; box-shadow: var(--shadow); transition: border-color 0.2s; }
  .cours-card:hover { border-color: #c8c0b5; }
  .cours-card.inscrit { border-color: var(--accent); background: var(--accent-light); }
  .cours-info { flex: 1; min-width: 0; }
  .cours-label { font-size: 15px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cours-meta { margin-top: 4px; font-size: 12px; color: var(--muted); }
  .badge-inscrit { font-size: 11px; font-weight: 600; color: var(--accent); background: #c8e8d8; border-radius: 20px; padding: 2px 10px; white-space: nowrap; }
  .btn { border: none; border-radius: 7px; padding: 8px 16px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.18s; white-space: nowrap; }
  .btn-postuler { background: var(--accent); color: #fff; }
  .btn-postuler:hover { background: #235c42; }
  .btn-desinscrire { background: var(--danger-light); color: var(--danger); border: 1px solid #f0c0bc; }
  .btn-desinscrire:hover { background: #f9dfdd; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .empty-state { text-align: center; padding: 48px 24px; color: var(--muted); font-size: 14px; }
  .empty-state svg { margin-bottom: 12px; opacity: 0.4; }
  #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--text); color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 500; opacity: 0; transition: all 0.3s ease; pointer-events: none; z-index: 100; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.success { background: var(--accent); }
  #toast.error { background: var(--danger); }
  .filtres-box {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px; margin-bottom: 16px; display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px;
  }
  .filtre-group label { display: block; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .filtre-group select { width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: 7px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text); background: var(--bg); outline: none; cursor: pointer; }
  .filtre-group select:focus { border-color: var(--accent); }
</style>
</head>
<body>

<header>
  <h1>Catalogue des cours</h1>
  <div id="user-info">Chargement…</div>
</header>

<div id="error-box" class="error-box" style="display:none"></div>
<div id="selector-box" style="display:none" class="selector-box">
  <label>Qui êtes-vous ?</label>
  <select id="enseignant-select" onchange="onSelectEnseignant(this.value)">
    <option value="">-- Sélectionnez votre nom --</option>
  </select>
</div>

<div class="tabs">
  <button class="tab active" onclick="setTab('tous', this)">Tous les cours</button>
  <button class="tab" onclick="setTab('mes', this)">Mes vœux</button>
</div>

<div id="filtres-box" class="filtres-box" style="display:none">
  <div class="filtre-group">
    <label>Campus</label>
    <select id="f-campus" onchange="render()"><option value="">Tous</option></select>
  </div>
  <div class="filtre-group">
    <label>Cycle</label>
    <select id="f-cycle" onchange="render()"><option value="">Tous</option></select>
  </div>
  <div class="filtre-group">
    <label>Année</label>
    <select id="f-annee" onchange="render()"><option value="">Toutes</option></select>
  </div>
  <div class="filtre-group">
    <label>Semestre</label>
    <select id="f-semestre" onchange="render()"><option value="">Tous</option></select>
  </div>
  <div class="filtre-group">
    <label>Option</label>
    <select id="f-option" onchange="render()"><option value="">Toutes</option></select>
  </div>
</div>

<div id="content"><div class="loader">Chargement des cours…</div></div>
<div id="toast"></div>

<script>
  let tableData = [];
  let enseignantRowId = null;
  let enseignantDiscipline = null;
  let enseignantCampus = null;
  let currentTab = 'tous';
  let busy = false;
  let loading = false;
  let enseignantsData = null;

  let urlToken = null;

  grist.ready({ requiredAccess: 'full' });

  // Récupérer le token depuis les paramètres de l'URL Grist
  grist.onOptions(function(opts, interaction) {
    console.log('opts:', JSON.stringify(opts));
    console.log('interaction:', JSON.stringify(interaction));
    if (!urlToken && interaction && interaction.linkKeys && interaction.linkKeys.token) {
      urlToken = interaction.linkKeys.token;
    }
    console.log('urlToken final:', urlToken);
    if (!enseignantRowId && !loading) initialLoad();
  });

  grist.on('message', async (e) => {
    // Ne rien faire ici, initialLoad est géré par onOptions
  });

  async function initialLoad() {
    loading = true;
    try {
      // 1. Vérifier si l'utilisateur est responsable
      let responsablesData = null;
      try { responsablesData = await grist.docApi.fetchTable('Responsables'); } catch(e) {}

      // Charger enseignants
      enseignantsData = await grist.docApi.fetchTable('Enseignants');

      // Charger cours
      await reloadCours();

      // 2. Si une ligne visible dans Responsables → c'est un responsable
      if (responsablesData && responsablesData.id.length >= 1) {
        const ensCol = responsablesData.Enseignant || responsablesData.enseignant || [];
        const ensRowId = ensCol[0];
        if (ensRowId) {
          const idx = enseignantsData.id.indexOf(ensRowId);
          if (idx !== -1) {
            enseignantRowId = ensRowId;
            const disciplineCol = enseignantsData.Discipline || null;
            const campusCol = enseignantsData.Campus || null;
            enseignantDiscipline = disciplineCol ? disciplineCol[idx] : null;
            enseignantCampus = campusCol ? campusCol[idx] : null;
            const nomCol = enseignantsData.Nom || null;
            const prenomCol = enseignantsData.Prenom || null;
            const nomAffiche = (nomCol ? nomCol[idx] : '') + (prenomCol ? ' ' + prenomCol[idx] : '') || 'Responsable';
            document.getElementById('user-info').innerHTML = 'Connecté en tant que <span>' + nomAffiche + '</span> (Responsable)';
            hideError();
            render();
            loading = false;
            return;
          }
        }
      }

      // 3. Sinon : enseignant normal — une seule ligne visible dans Enseignants
      if (enseignantsData.id.length === 1) {
        const idx = 0;
        enseignantRowId = enseignantsData.id[idx];
        const disciplineCol = enseignantsData.Discipline || null;
        const campusCol = enseignantsData.Campus || null;
        enseignantDiscipline = disciplineCol ? disciplineCol[idx] : null;
        enseignantCampus = campusCol ? campusCol[idx] : null;
        const nomCol = enseignantsData.Nom || null;
        const prenomCol = enseignantsData.Prenom || null;
        const nomAffiche = (nomCol ? nomCol[idx] : '') + (prenomCol ? ' ' + prenomCol[idx] : '') || 'Enseignant';
        document.getElementById('user-info').innerHTML = 'Connecté en tant que <span>' + nomAffiche + '</span>';
        hideError();
        render();
        loading = false;
        return;
      }

      // Fallback sélecteur manuel (admin)
      afficherSelecteur();

    } catch(err) {
      showError('Erreur : ' + err.message);
    } finally {
      loading = false;
    }
  }

  async function reloadCours() {
    const cours = await grist.docApi.fetchTable('Cours');
    const ids = cours.id;
    const labels = cours.Cours_label || cours.cours_label || [];
    const candidats = cours.Candidats || cours.candidats || [];
    const disciplines = cours.Discipline || cours.discipline || [];
    const disciplines2 = cours.Discipline_2 || cours.discipline_2 || [];
    const campus = cours.Campus || cours.campus || [];
    const cycles = cours.Cycle || cours.cycle || [];
    const annees = cours.Annee || cours.annee || [];
    const semestres = cours.Semestre || cours.semestre || [];
    const options = cours.Option || cours.option || [];
    tableData = ids.map(function(id, i) {
      var cands = candidats[i];
      return {
        rowId: id,
        label: labels[i] || '',
        discipline: disciplines[i] || null,
        discipline2: disciplines2[i] || null,
        campus: campus[i] || null,
        cycle: cycles[i] || null,
        annee: annees[i] || null,
        semestre: semestres[i] || null,
        option: options[i] || null,
        candidats: (function(v){ if(!v) return []; if(Array.isArray(v)) return v.filter(function(x){ return typeof x === 'number' && x > 0; }); if(typeof v === 'number' && v > 0) return [v]; return []; })(cands)
      };
    }).filter(function(r) { return r.label.length > 3; });
  }

  function afficherSelecteur() {
    document.getElementById('user-info').textContent = 'Veuillez vous identifier';
    var nomCol = enseignantsData.Nom || enseignantsData.nom || enseignantsData.Prenom || null;
    var emailCol = enseignantsData.Email || enseignantsData.email || [];
    var sel = document.getElementById('enseignant-select');
    enseignantsData.id.forEach(function(id, i) {
      var opt = document.createElement('option');
      opt.value = id;
      opt.textContent = nomCol ? nomCol[i] : (emailCol[i] || ('Enseignant #' + id));
      sel.appendChild(opt);
    });
    document.getElementById('selector-box').style.display = 'block';
    document.getElementById('content').innerHTML = '';
  }

  function onSelectEnseignant(val) {
    if (!val) return;
    enseignantRowId = parseInt(val);
    var nomCol = enseignantsData.Nom || enseignantsData.nom || null;
    var prenomCol = enseignantsData.Prenom || enseignantsData.prenom || null;
    var disciplineCol = enseignantsData.Discipline || enseignantsData.discipline || null;
    var campusCol = enseignantsData.Campus || enseignantsData.campus || null;
    var idx = enseignantsData.id.indexOf(enseignantRowId);
    var nomAffiche = (nomCol ? nomCol[idx] : '') + (prenomCol ? ' ' + prenomCol[idx] : '') || ('Enseignant #' + enseignantRowId);
    enseignantDiscipline = disciplineCol ? disciplineCol[idx] : null;
    enseignantCampus = campusCol ? campusCol[idx] : null;
    document.getElementById('user-info').innerHTML = 'Connecté en tant que <span>' + nomAffiche + '</span>';
    document.getElementById('selector-box').style.display = 'none';
    render();
  }

  function setTab(tab, btn) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
    btn.classList.add('active');
    render();
  }

  function peuplerFiltres(rowsBase) {
    var box = document.getElementById('filtres-box');
    box.style.display = 'grid';

    function peuplerSelect(id, vals, label) {
      var sel = document.getElementById(id);
      var current = sel.value;
      sel.innerHTML = '<option value="">' + label + '</option>';
      [...new Set(vals.filter(function(v){ return v !== null && v !== undefined && v !== ''; }))].sort(function(a,b){return String(a).localeCompare(String(b),'fr');}).forEach(function(v) {
        var opt = document.createElement('option');
        opt.value = v; opt.textContent = v;
        if (String(v) === current) opt.selected = true;
        sel.appendChild(opt);
      });
    }

    var fCampus = document.getElementById('f-campus').value;
    var fCycle = document.getElementById('f-cycle').value;
    var fAnnee = document.getElementById('f-annee').value;
    var fSemestre = document.getElementById('f-semestre').value;

    // Campus : sur tous les cours de la discipline
    peuplerSelect('f-campus', rowsBase.map(function(r){return r.campus;}), 'Tous les campus');

    // Cycle : filtré par campus
    var r1 = fCampus ? rowsBase.filter(function(r){return r.campus === fCampus;}) : rowsBase;
    peuplerSelect('f-cycle', r1.map(function(r){return r.cycle;}), 'Tous les cycles');

    // Année : filtré par campus + cycle
    var r2 = fCycle ? r1.filter(function(r){return r.cycle === fCycle;}) : r1;
    peuplerSelect('f-annee', r2.map(function(r){return String(r.annee);}), 'Toutes les années');

    // Semestre : filtré par campus + cycle + année
    var r3 = fAnnee ? r2.filter(function(r){return String(r.annee) === fAnnee;}) : r2;
    peuplerSelect('f-semestre', r3.map(function(r){return String(r.semestre);}), 'Tous les semestres');

    // Option : filtré par campus + cycle + année + semestre
    var r4 = fSemestre ? r3.filter(function(r){return String(r.semestre) === fSemestre;}) : r3;
    peuplerSelect('f-option', r4.map(function(r){return r.option;}), 'Toutes les options');
  }

  function render() {
    if (!enseignantRowId) return;
    var rows = tableData.slice();
    if (enseignantDiscipline) {
      rows = rows.filter(function(r) {
        return r.discipline === enseignantDiscipline || r.discipline2 === enseignantDiscipline;
      });
    }
    if (currentTab === 'mes') {
      rows = rows.filter(function(r) { return r.candidats.indexOf(enseignantRowId) !== -1; });
    }

    // Peupler les filtres en cascade
    peuplerFiltres(rows);

    // Appliquer les filtres sélectionnés
    var fCampus = document.getElementById('f-campus').value;
    var fCycle = document.getElementById('f-cycle').value;
    var fAnnee = document.getElementById('f-annee').value;
    var fSemestre = document.getElementById('f-semestre').value;
    var fOption = document.getElementById('f-option').value;
    if (fCampus) rows = rows.filter(function(r) { return r.campus === fCampus; });
    if (fCycle) rows = rows.filter(function(r) { return r.cycle === fCycle; });
    if (fAnnee) rows = rows.filter(function(r) { return String(r.annee) === fAnnee; });
    if (fSemestre) rows = rows.filter(function(r) { return String(r.semestre) === fSemestre; });
    if (fOption) rows = rows.filter(function(r) { return r.option === fOption; });
    var el = document.getElementById('content');
    if (rows.length === 0) {
      el.innerHTML = '<div class="empty-state"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg><div>' + (currentTab === 'mes' ? "Vous n'avez posé aucun vœu." : 'Aucun cours trouvé.') + '</div></div>';
      return;
    }
    el.innerHTML = '<div class="cours-list">' + rows.map(cardHTML).join('') + '</div>';
  }

  function cardHTML(row) {
    var inscrit = row.candidats.indexOf(enseignantRowId) !== -1;
    var nb = row.candidats.length;
    var meta = nb === 0 ? 'Aucun candidat' : (nb + ' candidat' + (nb > 1 ? 's' : ''));
    return '<div class="cours-card' + (inscrit ? ' inscrit' : '') + '">'
      + '<div class="cours-info"><div class="cours-label">' + esc(row.label) + '</div><div class="cours-meta">' + meta + '</div></div>'
      + (inscrit ? '<span class="badge-inscrit">✓ Inscrit</span>' : '')
      + (inscrit
          ? '<button class="btn btn-desinscrire" onclick="desinscrire(' + row.rowId + ')">Me désinscrire</button>'
          : '<button class="btn btn-postuler" onclick="postuler(' + row.rowId + ')">Candidater</button>')
      + '</div>';
  }

  async function postuler(coursRowId) {
    if (busy || !enseignantRowId) return;
    busy = true;
    disableButtons();
    var row = tableData.find(function(r) { return r.rowId === coursRowId; });
    var newList = row.candidats.concat([enseignantRowId]);
    await doUpdate(coursRowId, newList, 'Vœu enregistré pour « ' + row.label + ' »');
  }

  async function desinscrire(coursRowId) {
    if (busy || !enseignantRowId) return;
    busy = true;
    disableButtons();
    var row = tableData.find(function(r) { return r.rowId === coursRowId; });
    var newList = row.candidats.filter(function(id) { return id !== enseignantRowId; });
    await doUpdate(coursRowId, newList, 'Désinscription effectuée');
  }

  async function doUpdate(coursRowId, newList, msg) {
    try {
      loading = true;
      await grist.docApi.applyUserActions([
        ['UpdateRecord', 'Cours', coursRowId, { Candidats: newList.length > 0 ? ['L'].concat(newList) : null }]
      ]);
      var row = tableData.find(function(r) { return r.rowId === coursRowId; });
      if (row) row.candidats = newList;
      showToast(msg, 'success');
      render();
    } catch(err) {
      showToast('Erreur : ' + err.message, 'error');
    } finally {
      busy = false;
      loading = false;
    }
  }

  function disableButtons() {
    document.querySelectorAll('.btn').forEach(function(b) { b.disabled = true; });
  }

  function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  var toastTimer;
  function showToast(msg, type) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show ' + (type || '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function() { t.className = ''; }, 3000);
  }

  function showError(msg) {
    var el = document.getElementById('error-box');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('content').innerHTML = '';
  }

  function hideError() {
    document.getElementById('error-box').style.display = 'none';
  }

  initialLoad();
</script>
</body>
</html>
