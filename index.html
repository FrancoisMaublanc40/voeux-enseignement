<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candidatures aux cours</title>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f2ec;
    --surface: #ffffff;
    --border: #e2ddd5;
    --text: #1a1714;
    --muted: #8c8278;
    --accent: #2d6a4f;
    --accent-light: #e8f4ee;
    --danger: #c0392b;
    --danger-light: #fdf0ef;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px;
  }

  header {
    margin-bottom: 28px;
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    font-weight: 400;
    color: var(--text);
    line-height: 1.2;
  }

  #user-info {
    margin-top: 6px;
    font-size: 13px;
    color: var(--muted);
    font-weight: 400;
  }

  #user-info span {
    font-weight: 500;
    color: var(--accent);
  }

  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px;
  }

  .tab {
    flex: 1;
    padding: 8px;
    border: none;
    border-radius: 6px;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.18s;
  }

  .tab.active {
    background: var(--accent);
    color: #fff;
  }

  .cours-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .cours-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    box-shadow: var(--shadow);
    transition: border-color 0.2s;
  }

  .cours-card:hover { border-color: #c8c0b5; }

  .cours-card.inscrit {
    border-color: var(--accent);
    background: var(--accent-light);
  }

  .cours-info { flex: 1; min-width: 0; }

  .cours-label {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .cours-meta {
    margin-top: 4px;
    font-size: 12px;
    color: var(--muted);
  }

  .badge-inscrit {
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    background: #c8e8d8;
    border-radius: 20px;
    padding: 2px 10px;
    white-space: nowrap;
  }

  .btn {
    border: none;
    border-radius: 7px;
    padding: 8px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.18s;
    white-space: nowrap;
  }

  .btn-postuler {
    background: var(--accent);
    color: #fff;
  }

  .btn-postuler:hover { background: #235c42; }

  .btn-desinscrire {
    background: var(--danger-light);
    color: var(--danger);
    border: 1px solid #f0c0bc;
  }

  .btn-desinscrire:hover { background: #f9dfdd; }

  .btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--muted);
    font-size: 14px;
  }

  .empty-state svg { margin-bottom: 12px; opacity: 0.4; }

  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--text);
    color: #fff;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    transition: all 0.3s ease;
    pointer-events: none;
    z-index: 100;
  }

  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  #toast.success { background: var(--accent); }
  #toast.error { background: var(--danger); }

  .loader {
    text-align: center;
    padding: 48px;
    color: var(--muted);
    font-size: 14px;
  }

  .error-box {
    background: var(--danger-light);
    border: 1px solid #f0c0bc;
    border-radius: 8px;
    padding: 14px 18px;
    color: var(--danger);
    font-size: 13px;
    margin-bottom: 16px;
  }
</style>
</head>
<body>

<header>
  <h1>Catalogue des cours</h1>
  <div id="user-info">Chargement…</div>
</header>

<div id="error-box" class="error-box" style="display:none"></div>


<div class="tabs">
  <button class="tab active" onclick="setTab('tous', this)">Tous les cours</button>
  <button class="tab" onclick="setTab('mes', this)">Mes vœux</button>
</div>

<div id="content"><div class="loader">Chargement des cours…</div></div>
<div id="toast"></div>

<script>
  let tableData = [];       // lignes de COURS
  let enseignantRowId = null; // rowId de l'enseignant connecté dans ENSEIGNANTS
  let enseignantEmail = null;
  let currentTab = 'tous';
  let busy = false;

  // ── Initialisation Grist ──────────────────────────────────────────────────
  grist.ready({ requiredAccess: 'full' });

  grist.on('message', async (e) => {
    if (e.tableId) await loadData();
  });

  async function loadData() {
    try {
      // 1. Récupérer l'email de l'utilisateur connecté
      const user = await grist.docApi.getUserProfile?.() ?? null;
      // Fallback : on essaie via getOption ou on lit depuis la table
      enseignantEmail = user?.email ?? null;

      // 2. Lire la table ENSEIGNANTS pour trouver le rowId correspondant
      const enseignants = await grist.docApi.fetchTable('Enseignants');
      if (!enseignantEmail) {
        showError("Impossible de détecter votre email. Vérifiez que vous êtes connecté à Grist.");
        return;
      }

      const emailCol = enseignants.Email ?? enseignants.email ?? null;
      if (!emailCol) {
        showError("Colonne 'Email' introuvable dans la table ENSEIGNANTS.");
        return;
      }

      const idx = emailCol.findIndex(e => e && e.toLowerCase() === enseignantEmail.toLowerCase());
      if (idx === -1) {
        showError(`Votre email (${enseignantEmail}) n'est pas trouvé dans la table ENSEIGNANTS.`);
        return;
      }
      enseignantRowId = enseignants.id[idx];

      // Afficher le nom si disponible
      const nomCol = enseignants.Nom ?? enseignants.nom ?? enseignants.Prenom ?? null;
      const nomAffiche = nomCol ? nomCol[idx] : enseignantEmail;
      document.getElementById('user-info').innerHTML = `Connecté en tant que <span>${nomAffiche}</span>`;

      // 3. Lire la table COURS
      const cours = await grist.docApi.fetchTable('Cours');
      tableData = buildRows(cours);

      hideError();
      renderList();
    } catch (err) {
      showError("Erreur de chargement : " + err.message);
    }
  }

  function buildRows(cours) {
    const ids = cours.id;
    const labels = cours.Cours_label ?? cours.cours_label ?? [];
    // Candidats est une colonne de type RefList → tableau de tableaux de rowIds
    const candidats = cours.Candidats ?? cours.candidats ?? [];

    return ids.map((id, i) => ({
      rowId: id,
      label: labels[i] ?? '(sans titre)',
      candidats: Array.isArray(candidats[i]) ? candidats[i] : (candidats[i] ? [candidats[i]] : []),
    }));
  }

  // ── Rendu ─────────────────────────────────────────────────────────────────
  function setTab(tab, btn) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    renderList();
  }

  function renderList() {
    let rows = [...tableData];
    if (currentTab === 'mes') rows = rows.filter(r => r.candidats.includes(enseignantRowId));

    const el = document.getElementById('content');
    if (rows.length === 0) {
      el.innerHTML = `<div class="empty-state">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
        <div>${currentTab === 'mes' ? 'Vous n\'avez posé aucun vœu.' : 'Aucun cours trouvé.'}</div>
      </div>`;
      return;
    }

    el.innerHTML = `<div class="cours-list">${rows.map(cardHTML).join('')}</div>`;
  }

  function cardHTML(row) {
    const inscrit = row.candidats.includes(enseignantRowId);
    const nbCandidats = row.candidats.length;
    const meta = nbCandidats === 0 ? 'Aucun candidat' : `${nbCandidats} candidat${nbCandidats > 1 ? 's' : ''}`;

    return `<div class="cours-card ${inscrit ? 'inscrit' : ''}">
      <div class="cours-info">
        <div class="cours-label">${esc(row.label)}</div>
        <div class="cours-meta">${meta}</div>
      </div>
      ${inscrit ? `<span class="badge-inscrit">✓ Inscrit</span>` : ''}
      ${inscrit
        ? `<button class="btn btn-desinscrire" onclick="desinscrire(${row.rowId})">Me désinscrire</button>`
        : `<button class="btn btn-postuler" onclick="postuler(${row.rowId})">Je postule</button>`
      }
    </div>`;
  }

  // ── Actions ───────────────────────────────────────────────────────────────
  async function postuler(coursRowId) {
    if (busy || !enseignantRowId) return;
    busy = true;
    const row = tableData.find(r => r.rowId === coursRowId);
    const newList = [...row.candidats, enseignantRowId];
    await updateCandidats(coursRowId, row, newList, `Vœu enregistré pour « ${row.label} »`, 'success');
  }

  async function desinscrire(coursRowId) {
    if (busy || !enseignantRowId) return;
    busy = true;
    const row = tableData.find(r => r.rowId === coursRowId);
    const newList = row.candidats.filter(id => id !== enseignantRowId);
    await updateCandidats(coursRowId, row, newList, `Désinscription de « ${row.label} » effectuée`, 'success');
  }

  async function updateCandidats(coursRowId, row, newList, msg, type) {
    try {
      await grist.docApi.applyUserActions([
        ['UpdateRecord', 'Cours', coursRowId, { Candidats: ['L', ...newList] }]
      ]);
      row.candidats = newList;
      showToast(msg, type);
      renderList();
    } catch (err) {
      showToast('Erreur : ' + err.message, 'error');
    } finally {
      busy = false;
    }
  }

  // ── Utilitaires ───────────────────────────────────────────────────────────
  function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  let toastTimer;
  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.className = '', 3000);
  }

  function showError(msg) {
    const el = document.getElementById('error-box');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('content').innerHTML = '';
  }

  function hideError() {
    document.getElementById('error-box').style.display = 'none';
  }

  // Démarrage
  loadData();
</script>
</body>
</html>
