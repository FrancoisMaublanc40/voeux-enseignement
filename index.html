<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vœux d'enseignement</title>
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f5f0;
      --surface: #ffffff;
      --accent: #1a3a5c;
      --accent2: #c8873a;
      --text: #1c1c1c;
      --muted: #6b6b6b;
      --border: #e0ddd6;
      --checked-bg: #eef3f8;
      --checked-border: #1a3a5c;
      --radius: 10px;
      --shadow: 0 2px 12px rgba(0,0,0,0.07);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 32px 24px;
    }

    header {
      margin-bottom: 32px;
    }

    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.9rem;
      color: var(--accent);
      line-height: 1.2;
    }

    header p {
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .user-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      background: var(--accent);
      color: white;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.82rem;
      font-weight: 500;
    }

    .discipline-badge {
      display: inline-block;
      margin-top: 8px;
      background: var(--accent2);
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    .section-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.1rem;
      color: var(--accent);
      margin: 28px 0 12px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--accent2);
    }

    .cours-grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .cours-item {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
      display: flex;
      align-items: center;
      gap: 14px;
      user-select: none;
    }

    .cours-item:hover {
      border-color: var(--accent);
      box-shadow: var(--shadow);
    }

    .cours-item.checked {
      background: var(--checked-bg);
      border-color: var(--checked-border);
    }

    .cours-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
      flex-shrink: 0;
      cursor: pointer;
    }

    .cours-label {
      font-size: 0.88rem;
      line-height: 1.4;
      flex: 1;
    }

    .cours-type {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 12px;
      flex-shrink: 0;
    }
    .type-CM { background: #dbeafe; color: #1d4ed8; }
    .type-TD { background: #dcfce7; color: #166534; }
    .type-TP { background: #fef9c3; color: #854d0e; }

    .commentaire-wrap {
      margin-top: 28px;
    }

    .commentaire-wrap label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 8px;
    }

    textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      resize: vertical;
      min-height: 80px;
      background: var(--surface);
      color: var(--text);
      transition: border-color 0.15s;
    }

    textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    .submit-bar {
      margin-top: 28px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    button.submit {
      background: var(--accent);
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    button.submit:hover { background: #142d47; }
    button.submit:active { transform: scale(0.98); }
    button.submit:disabled { background: #9aabba; cursor: not-allowed; }

    .counter {
      font-size: 0.82rem;
      color: var(--muted);
    }

    .msg {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 0.88rem;
      font-weight: 500;
    }
    .msg.success { background: #dcfce7; color: #166534; border: 1px solid #86efac; }
    .msg.error   { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
    .msg.info    { background: #dbeafe; color: #1d4ed8; border: 1px solid #93c5fd; }

    .loading {
      text-align: center;
      padding: 60px 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .empty {
      text-align: center;
      padding: 40px 0;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .semestre-group { margin-bottom: 4px; }
  </style>
</head>
<body>

<header>
  <h1>Vœux d'enseignement<br>2026–2027</h1>
  <p>Sélectionnez les cours que vous souhaitez enseigner.</p>
  <div id="user-badge" class="user-badge" style="display:none">👤 <span id="user-name"></span></div>
  <div id="discipline-badge" class="discipline-badge" style="display:none"></div>
</header>

<div id="app">
  <div class="loading">Chargement en cours…</div>
</div>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let gristUser   = null;   // { email, name }
  let enseignant  = null;   // record from Enseignants table
  let allCours    = [];     // all records from Cours table
  let filteredCours = [];   // courses matching enseignant's discipline
  let checked     = new Set();
  let tables      = {};     // { Enseignants: [...], Cours: [...], Voeux: [...] }

  // ── Grist init ────────────────────────────────────────────────────────────
  grist.ready({ requiredAccess: 'full' });

  grist.on('message', async (msg) => {
    if (msg.tableId) return; // row selection, ignore
  });

  async function init() {
    try {
      // 1. Get current user
      const userInfo = await grist.getUser().catch(() => null);
      if (userInfo) {
        gristUser = userInfo;
        document.getElementById('user-name').textContent = userInfo.name || userInfo.email || '';
        document.getElementById('user-badge').style.display = 'inline-flex';
      }

      // 2. Fetch all tables data
      const [enseignants, cours, voeux] = await Promise.all([
        grist.docApi.fetchTable('Enseignants'),
        grist.docApi.fetchTable('Cours'),
        grist.docApi.fetchTable('Voeux'),
      ]);

      tables = { enseignants, cours, voeux };

      // 3. Find enseignant by email
      const emails = enseignants.Email || enseignants.email || [];
      const userEmail = (gristUser && (gristUser.email || gristUser.Email)) || '';
      let ensIdx = -1;

      if (userEmail) {
        ensIdx = emails.findIndex(e => (e || '').toLowerCase() === userEmail.toLowerCase());
      }

      if (ensIdx === -1) {
        // Not found by email — show manual selector
        renderManualSelector(enseignants, cours, voeux);
        return;
      }

      const ensId = enseignants.id[ensIdx];
      const discipline = (enseignants.Discipline || enseignants.discipline || [])[ensIdx] || '';
      const nom    = (enseignants.Nom    || enseignants.nom    || [])[ensIdx] || '';
      const prenom = (enseignants.Prenom || enseignants.prenom || [])[ensIdx] || '';

      enseignant = { id: ensId, discipline, nom, prenom, email: userEmail };

      document.getElementById('discipline-badge').textContent = discipline;
      document.getElementById('discipline-badge').style.display = 'inline-block';

      // 4. Filter courses by discipline
      filterAndRender(cours, voeux, discipline, ensId);

    } catch (e) {
      render(`<div class="msg error">Erreur lors du chargement : ${e.message}</div>`);
    }
  }

  // ── Filter courses ────────────────────────────────────────────────────────
  function filterAndRender(cours, voeux, discipline, ensId) {
    const ids        = cours.id         || [];
    const modules    = cours.Module     || cours.module     || [];
    const types      = cours.Type       || cours.type       || [];
    const semestres  = cours.Semestre   || cours.semestre   || [];
    const volumes    = cours.Volume_groupe || cours.volume_groupe || [];
    const disciplines= cours.Discipline || cours.discipline || [];
    const labels     = cours.Cours_label|| cours.cours_label|| [];

    // Filter by discipline
    filteredCours = ids.map((id, i) => ({
      id, module: modules[i], type: types[i],
      semestre: semestres[i], volume: volumes[i],
      discipline: disciplines[i], label: labels[i] || modules[i],
    })).filter(c => (c.discipline || '').toLowerCase() === discipline.toLowerCase());

    // Find existing vœu for this enseignant
    const voeuEns    = voeux.Enseignant || voeux.enseignant || [];
    const voeuCours  = voeux.Cours_souhaites || voeux.Cours_souhaités || voeux.cours_souhaites || [];
    const existingIdx = voeuEns.findIndex(e => e === ensId);

    if (existingIdx !== -1) {
      // Pre-check already submitted courses
      const alreadyChecked = voeuCours[existingIdx];
      if (Array.isArray(alreadyChecked)) {
        alreadyChecked.forEach(id => checked.add(id));
      }
    }

    renderForm();
  }

  // ── Render main form ──────────────────────────────────────────────────────
  function renderForm() {
    if (filteredCours.length === 0) {
      render('<div class="empty">Aucun cours trouvé pour votre discipline.</div>');
      return;
    }

    // Group by semestre
    const bySem = {};
    filteredCours.forEach(c => {
      const k = c.semestre || '?';
      if (!bySem[k]) bySem[k] = [];
      bySem[k].push(c);
    });

    let html = '';
    Object.keys(bySem).sort().forEach(sem => {
      html += `<div class="semestre-group">
        <div class="section-title">Semestre ${sem}</div>
        <div class="cours-grid">`;
      bySem[sem].forEach(c => {
        const isChecked = checked.has(c.id);
        html += `
          <label class="cours-item${isChecked ? ' checked' : ''}" data-id="${c.id}">
            <input type="checkbox" value="${c.id}" ${isChecked ? 'checked' : ''}/>
            <span class="cours-label">${c.label || c.module}</span>
            <span class="cours-type type-${c.type}">${c.type}</span>
          </label>`;
      });
      html += `</div></div>`;
    });

    html += `
      <div class="commentaire-wrap">
        <label for="commentaire">Commentaire (optionnel)</label>
        <textarea id="commentaire" placeholder="Contraintes, disponibilités, remarques…"></textarea>
      </div>
      <div class="submit-bar">
        <button class="submit" id="btn-submit">Envoyer mes vœux</button>
        <span class="counter" id="counter">${checked.size} cours sélectionné(s)</span>
      </div>
      <div id="msg"></div>`;

    render(html);
    bindEvents();
  }

  function bindEvents() {
    document.querySelectorAll('.cours-item').forEach(item => {
      item.addEventListener('click', (e) => {
        if (e.target.tagName === 'INPUT') return; // handled below
        const cb = item.querySelector('input[type="checkbox"]');
        cb.checked = !cb.checked;
        toggleCours(parseInt(item.dataset.id), cb.checked, item);
      });
      const cb = item.querySelector('input[type="checkbox"]');
      cb.addEventListener('change', () => {
        toggleCours(parseInt(item.dataset.id), cb.checked, item);
      });
    });

    document.getElementById('btn-submit').addEventListener('click', submitVoeux);
  }

  function toggleCours(id, isChecked, item) {
    if (isChecked) { checked.add(id); item.classList.add('checked'); }
    else           { checked.delete(id); item.classList.remove('checked'); }
    document.getElementById('counter').textContent = `${checked.size} cours sélectionné(s)`;
  }

  // ── Submit ────────────────────────────────────────────────────────────────
  async function submitVoeux() {
    const btn = document.getElementById('btn-submit');
    const msgEl = document.getElementById('msg');
    const commentaire = (document.getElementById('commentaire') || {}).value || '';

    btn.disabled = true;
    btn.textContent = 'Envoi…';
    msgEl.className = 'msg info';
    msgEl.textContent = 'Envoi en cours…';

    try {
      const coursIds = Array.from(checked);

      // Check if a vœu already exists for this enseignant
      const voeux = tables.voeux;
      const voeuEns = voeux.Enseignant || voeux.enseignant || [];
      const existingIdx = voeuEns.findIndex(e => e === enseignant.id);
      const existingRowId = existingIdx !== -1 ? voeux.id[existingIdx] : null;

      if (existingRowId) {
        // Update existing record
        await grist.docApi.applyUserActions([['UpdateRecord', 'Voeux', existingRowId, {
          Cours_souhaites: ['L', ...coursIds],
          Commentaire: commentaire,
        }]]);
      } else {
        // Add new record
        await grist.docApi.applyUserActions([['AddRecord', 'Voeux', null, {
          Enseignant: enseignant.id,
          Cours_souhaites: ['L', ...coursIds],
          Commentaire: commentaire,
        }]]);
      }

      msgEl.className = 'msg success';
      msgEl.textContent = `✅ Vœux enregistrés — ${coursIds.length} cours sélectionné(s).`;
      btn.textContent = 'Envoyer mes vœux';
      btn.disabled = false;

      // Refresh local voeux cache
      tables.voeux = await grist.docApi.fetchTable('Voeux');

    } catch(e) {
      msgEl.className = 'msg error';
      msgEl.textContent = `Erreur : ${e.message}`;
      btn.textContent = 'Envoyer mes vœux';
      btn.disabled = false;
    }
  }

  // ── Manual selector (fallback when email not found) ───────────────────────
  function renderManualSelector(enseignants, cours, voeux) {
    const ids     = enseignants.id     || [];
    const noms    = enseignants.Nom    || enseignants.nom    || [];
    const prenoms = enseignants.Prenom || enseignants.prenom || [];
    const discs   = enseignants.Discipline || enseignants.discipline || [];

    let opts = ids.map((id, i) => `<option value="${id}" data-disc="${discs[i]||''}">${noms[i]||''} ${prenoms[i]||''}</option>`).join('');

    render(`
      <div class="msg info">Votre adresse email n'a pas été reconnue automatiquement. Sélectionnez votre nom :</div>
      <br>
      <select id="sel-ens" style="width:100%;padding:10px;border-radius:8px;border:1.5px solid #e0ddd6;font-family:inherit;font-size:0.9rem">
        <option value="">— Choisissez votre nom —</option>
        ${opts}
      </select>
      <br><br>
      <button class="submit" id="btn-sel">Continuer</button>
    `);

    document.getElementById('btn-sel').addEventListener('click', () => {
      const sel = document.getElementById('sel-ens');
      const id  = parseInt(sel.value);
      if (!id) return;
      const idx = ids.indexOf(id);
      enseignant = {
        id, discipline: discs[idx]||'', email: '',
        nom: noms[idx]||'', prenom: prenoms[idx]||'',
      };
      document.getElementById('discipline-badge').textContent = enseignant.discipline;
      document.getElementById('discipline-badge').style.display = 'inline-block';
      tables.voeux = voeux;
      filterAndRender(cours, voeux, enseignant.discipline, id);
    });
  }

  // ── Helper ────────────────────────────────────────────────────────────────
  function render(html) {
    document.getElementById('app').innerHTML = html;
  }

  init();
</script>
</body>
</html>
